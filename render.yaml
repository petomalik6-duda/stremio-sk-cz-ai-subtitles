services:
  - type: web
    name: stremio-sk-cz-ai-subtitles
    runtime: node
    plan: free
    buildCommand: npm ci --no-audit --no-fund
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: CACHE_DIR
        value: ./data/cache
      - key: GEMINI_MODEL
        value: gemini-2.5-flash-lite
      - key: TOKEN_SECRET
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENSUBTITLES_API_KEY
        sync: false
      - key: OPENSUBTITLES_USERNAME
        sync: false
      - key: OPENSUBTITLES_PASSWORD
        sync: false
