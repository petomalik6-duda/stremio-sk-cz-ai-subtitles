services:
  - type: web
    name: stremio-sk-cz-deepl-subtitles
    runtime: node
    plan: free
    buildCommand: npm ci --no-audit --no-fund
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: CACHE_DIR
        value: ./data/cache
      - key: DEEPL_API_PLAN
        value: auto
      - key: DEEPL_TRANSLATION_MODE
        value: document
      - key: DEEPL_TEXT_FALLBACK
        value: true
      - key: DEEPL_MODEL_TYPE
        value: prefer_quality_optimized
      - key: DEEPL_RETRIES
        value: 4
      - key: DEEPL_CONCURRENCY
        value: 1
      - key: TOKEN_SECRET
        generateValue: true
      - key: DEEPL_API_KEY
        sync: false
      - key: OPENSUBTITLES_API_KEY
        sync: false
      - key: OPENSUBTITLES_USERNAME
        sync: false
      - key: OPENSUBTITLES_PASSWORD
        sync: false
